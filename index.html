<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical AI Training Module - INclusive TrAIners</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
<!-- cookie banner -->



<!-- cookie banner -->


    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>


    
</head>




<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Mock Lucide Icons for HTML environment
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('intro');
            const [activeCase, setActiveCase] = useState(0);
            const [quizFeedback, setQuizFeedback] = useState(null);
            const [progress, setProgress] = useState({ 0: false, 1: false, 2: false, 3: false });
            const [checklist, setChecklist] = useState(new Array(8).fill(false));

            const cases = [
                {
                    id: 0,
                    title: "Case 1: Pricing Strategies",
                    subtitle: "Sustainable Tourism (Ref. Hallucination)",
                    description: "The trainer generates a teaching module on green tourism pricing. The output is fluent but lacks tangible evidence and cites unverifiable data.",
                    problem: "Absence of cited sources and inability to distinguish between historical data and current trends.",
                    quiz: {
                        question: "Why did the AI produce a convincing but potentially incorrect text?",
                        options: [
                            "It doesn't have internet access",
                            "It reasons based on statistical models, not real-time verification",
                            "The teacher's prompt was too short"
                        ],
                        correct: 1,
                        explanation: "Generative AI predicts the most probable next word. This scenario is a typical example of 'Hallucination' (see glossary), where linguistic plausibility masks factual error."
                    },
                    actions: ["Verify official sources", "Confirm publication date", "Request legal references"],
                    color: "blue",
                    iconName: "scale"
                },
                {
                    id: 1,
                    title: "Case 2: EU Project Design",
                    subtitle: "Digital Tourism Calls (Ref. EU AI Act)",
                    description: "Students use AI to map the criteria of a European call. The AI invents plausible but non-existent requirements.",
                    problem: "Imperfect eligibility criteria leading to serious design errors.",
                    quiz: {
                        question: "What is the main risk in this scenario?",
                        options: [
                            "Wasting time on useless tasks",
                            "Generating unrealistic expectations and work based on errors",
                            "Both of the above"
                        ],
                        correct: 2,
                        explanation: "Incorrect information on real calls can compromise the entire strategy. Compliance with the EU AI Act requires transparent systems and human supervision precisely to avoid such systemic risks."
                    },
                    actions: ["4-phase review", "Check official websites", "Final teacher validation"],
                    color: "green",
                    iconName: "globe"
                },
                {
                    id: 2,
                    title: "Case 3: Bias and Stereotypes",
                    subtitle: "Entrepreneur Profile (Ref. Algorithmic Bias)",
                    description: "Request to generate the profile of a leader in the sector. Result: Male, European, over 40.",
                    problem: "The AI reproduces dominant stereotypes ignoring the real diversity of the market.",
                    quiz: {
                        question: "How can this algorithmic bias be effectively countered?",
                        options: [
                            "Looking for another AI software",
                            "Discussing data with students and integrating inclusive real cases",
                            "Accepting the result as statistical data"
                        ],
                        correct: 1,
                        explanation: "This is a clear example of 'Algorithmic Bias'. Counter the prejudice by actively integrating diversity in training, as suggested by the INclusive TrAIners project."
                    },
                    actions: ["Request inclusive examples", "Integrate diverse real cases", "Critical classroom discussion"],
                    color: "amber",
                    iconName: "users"
                },
                {
                    id: 3,
                    title: "Case 4: Data without Sources",
                    subtitle: "Economic Impact Analysis (Ref. DigComp 2.2)",
                    description: "Analysis of the economic impact of digital tourism. The AI spouts decimal figures without bibliographic references.",
                    problem: "Unverifiable statistical data that seems authoritative only due to graphic formatting.",
                    quiz: {
                        question: "What is the first question to ask the AI in this case?",
                        options: [
                            "Can you redo the calculations?",
                            "Who produced this information and is it verifiable?",
                            "Can you write it in table format?"
                        ],
                        correct: 1,
                        explanation: "Exercising critical thinking on data is a fundamental competence of the 'DigComp 2.2' framework. Information literacy is the first step for safe AI use."
                    },
                    actions: ["Develop guiding questions", "Verify verifiability", "Ask about data update"],
                    color: "red",
                    iconName: "search"
                }
            ];

            const toggleCheck = (index) => {
                const newCheck = [...checklist];
                newCheck[index] = !newCheck[index];
                setChecklist(newCheck);
            };

            const handleQuiz = (index) => {
                if (index === cases[activeCase].quiz.correct) {
                    setQuizFeedback('correct');
                    const newProgress = { ...progress, [activeCase]: true };
                    setProgress(newProgress);
                } else {
                    setQuizFeedback('wrong');
                }
            };

            const completedCount = Object.values(progress).filter(Boolean).length;

            return (
                <div className="min-h-screen text-gray-900 flex flex-col">
                    {/* Sticky Progress Bar */}
                    <div className="sticky top-0 z-50 bg-white border-b border-gray-200 h-2">
                        <div className="bg-blue-600 h-full transition-all duration-500" style={{ width: `${(completedCount / 4) * 100}%` }}></div>
                    </div>

                    {/* Header with Logos */}
                    <header className="bg-white border-b border-gray-100 py-6 px-6">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
                            <a href="https://inclusivetrainers.eu/" target="_blank" rel="noopener noreferrer">
                                <img 
                                    src="logo_iclusive.png" 
                                    alt="Logo INclusive TrAIners" 
                                    className="h-16 md:h-20 object-contain"
                                />
                            </a>
                            <div className="text-center md:text-right">
                                <h1 className="text-xl md:text-2xl font-black text-gray-800">INclusive TrAIners</h1>
                                <p className="text-sm text-gray-500 font-medium">Ethics and inclusion of AI in continuing professional training</p>
                                <p className="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Project Code: 2025-1-ES01-KA220-VET-000355409</p>
                            </div>
                            <img src="images.png" alt="Erasmus+ Logo" className="h-12 md:h-14 object-contain" />
                        </div>
                    </header>

                    <main className="flex-grow max-w-5xl mx-auto px-6 pt-12 w-full">
                        <div className="text-center mb-12">
                            <p className="text-sm text-gray-500 font-medium">Learning Scenario: Real-world case studies aligned with ethical standards and relevant EU regulations, as well as regulatory frameworks, ensuring practical applicability and contextual relevance.</p>
                            <h1>M3: Critical Thinking and Ethical Decision-Making in CVET contexts</h1>
                            <h2 className="text-2xl font-black text-gray-900 mb-4 tracking-tight">Ethical AI Use: Training Module for C-VET Trainers</h2>

                            <p className="text-gray-600 max-w-2xl mx-auto text-lg">Critical tools for the responsible integration of Artificial Intelligence in training pathways.</p>
                        </div>

                        {/* Tab Navigation */}
                        <div className="flex flex-wrap justify-center gap-2 mb-10">
                            <button onClick={() => {setActiveTab('intro'); setQuizFeedback(null)}} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${activeTab === 'intro' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
                                <Icon name="book-open" size={18} /> Start
                            </button>
                            <button onClick={() => {setActiveTab('cases'); setQuizFeedback(null)}} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${activeTab === 'cases' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
                                <Icon name="search" size={18} /> Scenario Lab
                            </button>
                            <button onClick={() => {setActiveTab('checklist'); setQuizFeedback(null)}} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold transition-all ${activeTab === 'checklist' ? 'bg-blue-600 text-white shadow-lg' : 'bg-white text-gray-500 border border-gray-200 hover:bg-gray-50'}`}>
                                <Icon name="clipboard-list" size={18} /> Daily Practice
                            </button>
                        </div>

                        {/* Main Content Area */}
                        <div className="bg-white rounded-[2rem] shadow-xl border border-gray-100 overflow-hidden min-h-[500px]">
                            {activeTab === 'intro' && (
                                <div className="p-10 animate-in">
                                    <div className="grid md:grid-cols-2 gap-12 items-center">
                                        <div>
                                            <h2 className="text-3xl font-bold mb-6">Welcome Critical Mediator</h2>
                                            <p className="text-gray-600 mb-6 leading-relaxed">Your role in the VET center is to train professionals who know how to <strong>question</strong> technology, not just submit to it.</p>
                                            <div className="space-y-4 text-sm">
                                                <div className="flex gap-4 p-4 bg-blue-50 rounded-2xl border border-blue-100 items-center">
                                                    <Icon name="shield-check" className="text-blue-600" />
                                                    <span className="text-blue-900 font-bold uppercase">Compliant with EU AI Act</span>
                                                </div>
                                                <div className="flex gap-4 p-4 bg-amber-50 rounded-2xl border border-amber-100 items-center">
                                                    <Icon name="users" className="text-amber-600" />
                                                    <span className="text-amber-900 font-bold uppercase">Focus on Inclusion</span>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="bg-gray-100 rounded-3xl p-8 text-center flex flex-col items-center">
                                            <div className="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-6 shadow-md">
                                                <Icon name="lightbulb" size={32} className="text-yellow-500" />
                                            </div>
                                            <h3 className="font-bold text-xl mb-2">Learning Objective</h3>
                                            <p className="text-sm text-gray-500">Analyze the 4 critical scenarios to unlock the final content validation checklist.</p>
                                            <button onClick={() => setActiveTab('cases')} className="mt-6 bg-gray-900 text-white px-8 py-3 rounded-xl font-bold hover:bg-black transition-colors">Start now</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'cases' && (
                                <div className="flex flex-col md:flex-row h-full">
                                    <div className="md:w-64 bg-gray-50 border-r border-gray-100 p-6 space-y-2">
                                        {cases.map((c, i) => (
                                            <button key={i} onClick={() => {setActiveCase(i); setQuizFeedback(null)}} className={`w-full text-left p-3 rounded-xl transition-all flex items-center gap-3 ${activeCase === i ? 'bg-white shadow-sm border border-gray-200' : 'text-gray-500 hover:bg-gray-100'}`}>
                                                <div className={`w-2 h-2 rounded-full ${progress[i] ? 'bg-green-500' : 'bg-gray-300'}`}></div>
                                                <span className="text-xs font-bold uppercase tracking-wide">Case {i+1}</span>
                                            </button>
                                        ))}
                                    </div>
                                    <div className="flex-1 p-10 animate-in">
                                        <div className="flex justify-between items-start mb-8">
                                            <div>
                                                <h2 className="text-3xl font-black">{cases[activeCase].title}</h2>
                                                <p className="text-blue-600 font-bold">{cases[activeCase].subtitle}</p>
                                            </div>
                                            <div className={`p-4 rounded-2xl bg-gray-100 text-gray-600`}>
                                                <Icon name={cases[activeCase].iconName} size={32} />
                                            </div>
                                        </div>
                                        <div className="grid md:grid-cols-2 gap-8">
                                            <div className="space-y-6 text-sm">
                                                <div className="p-5 bg-gray-50 rounded-2xl border border-gray-100">
                                                    <h4 className="font-bold uppercase text-gray-400 mb-2 tracking-widest text-[10px]">Description</h4>
                                                    <p className="text-gray-700 leading-relaxed">{cases[activeCase].description}</p>
                                                </div>
                                                <div className="p-5 bg-red-50 rounded-2xl border border-red-100">
                                                    <h4 className="font-bold uppercase text-red-400 mb-2 tracking-widest text-[10px]">The Problem</h4>
                                                    <p className="text-red-900 font-medium">{cases[activeCase].problem}</p>
                                                </div>
                                            </div>
                                            <div className="bg-gray-900 rounded-[2rem] p-8 text-white shadow-2xl">
                                                <h4 className="text-amber-400 font-bold mb-4 flex items-center gap-2">Interactive Quiz</h4>
                                                <p className="text-sm mb-6 text-gray-300 leading-relaxed">{cases[activeCase].quiz.question}</p>
                                                {!quizFeedback ? (
                                                    <div className="space-y-2">
                                                        {cases[activeCase].quiz.options.map((opt, idx) => (
                                                            <button key={idx} onClick={() => handleQuiz(idx)} className="w-full text-left p-3 rounded-xl bg-gray-800 hover:bg-gray-700 text-xs transition-all border border-gray-700">
                                                                {opt}
                                                            </button>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <div className={`p-5 rounded-2xl ${quizFeedback === 'correct' ? 'bg-green-900/30 border border-green-500' : 'bg-red-900/30 border border-red-500'}`}>
                                                        <h5 className="font-bold mb-2 flex items-center gap-2">
                                                            <Icon name={quizFeedback === 'correct' ? "check-circle" : "x"} size={16} /> {quizFeedback === 'correct' ? 'Great!' : 'Try again'}
                                                        </h5>
                                                        <p className="text-xs text-gray-300 leading-relaxed mb-4">{cases[activeCase].quiz.explanation}</p>
                                                        {quizFeedback === 'wrong' && <button onClick={() => setQuizFeedback(null)} className="text-[10px] underline uppercase font-bold tracking-widest">Back to options</button>}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'checklist' && (
                                <div className="p-10 animate-in max-w-2xl mx-auto">
                                    <div className="text-center mb-8">
                                        <h2 className="text-3xl font-black mb-2">Supervision Checklist</h2>
                                        <p className="text-gray-500 font-medium">Verify AI output following ethics and inclusion principles before using it in the classroom.</p>
                                    </div>
                                    <div className="space-y-2 mb-10">
                                        {[
                                            "Is the content verifiable through primary sources?",
                                            "Are reliable bibliographic references present?",
                                            "Is the language used inclusive and free of stereotypes?",
                                            "Are the presented data up to date?",
                                            "Are students aware of AI use?",
                                            "Have the statistical limits of the provided response been explained?",
                                            "Has GDPR and AI Act compliance been verified?",
                                            "Has the teacher's final critical review been carried out?"
                                        ].map((item, i) => (
                                            <div key={i} onClick={() => toggleCheck(i)} className={`flex items-center justify-between p-4 rounded-xl border-2 cursor-pointer transition-all ${checklist[i] ? 'bg-green-50 border-green-200' : 'bg-white border-gray-100 hover:border-gray-200 shadow-sm'}`}>
                                                <span className={`font-bold text-sm ${checklist[i] ? 'text-green-700' : 'text-gray-500'}`}>{item}</span>
                                                <div className={`w-6 h-6 rounded flex items-center justify-center ${checklist[i] ? 'bg-green-500 text-white' : 'bg-gray-100 text-transparent'}`}>
                                                    <Icon name="check" size={14} />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="bg-blue-600 text-white p-8 rounded-[2rem] flex items-center gap-6 shadow-xl">
                                        <div className="shrink-0 bg-blue-500 p-4 rounded-2xl">
                                            <Icon name="user-check" size={40} />
                                        </div>
                                        <p className="text-sm font-medium italic leading-relaxed">"The trainer's task is to teach that AI is not an infallible oracle, but an assistant to be constantly questioned and validated."</p>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Key Concepts Glossary Section */}
                        <h2 className="mt-8">
                            This scenario integrates information contained in Module 3 and refers to the following concepts cited below.
                        </h2>

                        <div className="mt-16 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                            <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <h4 className="text-blue-600 font-black text-xs uppercase tracking-widest mb-3">EU AI Act</h4>
                                <p className="text-gray-600 text-[11px] leading-relaxed">The world's first regulatory framework on AI, aimed at ensuring that systems are safe, transparent, and respectful of fundamental rights.</p>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <h4 className="text-blue-600 font-black text-xs uppercase tracking-widest mb-3">DigComp 2.2</h4>
                                <p className="text-gray-600 text-[11px] leading-relaxed">European framework for digital competences, which now includes the critical ability to interact with data-based and AI systems.</p>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <h4 className="text-blue-600 font-black text-xs uppercase tracking-widest mb-3">Algorithmic Bias</h4>
                                <p className="text-gray-600 text-[11px] leading-relaxed">Systematic errors in a computer system that create unfair results, favoring one group over another based on biases in the data.</p>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow">
                                <h4 className="text-blue-600 font-black text-xs uppercase tracking-widest mb-3">Hallucination</h4>
                                <p className="text-gray-600 text-[11px] leading-relaxed">Phenomenon whereby AI generates plausible but completely false or unfounded information, due to its probabilistic nature.</p>
                            </div>
                        </div>
                    </main>

                    {/* Footer with EU Disclaimer */}
                    <footer className="mt-16 bg-white border-t border-gray-200 py-10 px-6">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-8">
                            <img src="img/images.png" alt="Erasmus+ Logo" className="h-16 object-contain" />
                            <p className="text-[11px] leading-relaxed text-gray-500 text-center md:text-left italic">
                                The support of the European Commission for the production of this publication does not constitute an endorsement of the contents which reflect the views only of the authors, and the Commission cannot be held responsible for any use which may be made of the information contained therein.
                            </p>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
